# =====================================================
# FRONTEND NEXTJS - LinguaGerman
# https://LinguaGerman.vanquyenhair.name.vn (Proxy to Next.js port 3055)
# =====================================================

server {
    listen 443 ssl http2;
    server_name LinguaGerman.vanquyenhair.name.vn;

    ssl_certificate /etc/letsencrypt/live/LinguaGerman.vanquyenhair.name.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/LinguaGerman.vanquyenhair.name.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3055;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Next.js HMR / dev hot reload nếu cần)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Cache static assets từ Next.js (_next/static)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3055;
        proxy_http_version 1.1;

        proxy_set_header Host $host;

        access_log off;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}

# =====================================================
# HTTP -> HTTPS redirect
# =====================================================
server {
    listen 80;
    server_name LinguaGerman.vanquyenhair.name.vn;

    if ($host = LinguaGerman.vanquyenhair.name.vn) {
        return 301 https://$host$request_uri;
    }

    return 301 https://$host$request_uri;
}
