# =====================================================
# BACKEND API NESTJS - JLearn
# https://api5.vanquyenhair.name.vn (Port 3054)
# =====================================================

server {
    listen 443 ssl http2;
    server_name api5.vanquyenhair.name.vn;

    client_max_body_size 200M;

    ssl_certificate /etc/letsencrypt/live/api5.vanquyenhair.name.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api5.vanquyenhair.name.vn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # =====================================================
    # Static uploads (images, files, audio)
    # Served from: /home/JLearn/backend/public/uploads/
    # =====================================================
    location /uploads/ {
        alias /home/JLearn/backend/public/uploads/;
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # =====================================================
    # API proxy – all /api/v1/* routes
    # Including: auth, users, courses, lessons, exams,
    #   questions, flashcards, orders, progress, admin,
    #   upload, streaming (video/hls)
    # =====================================================
    location /api/v1/ {
        client_max_body_size 200M;

        proxy_pass http://127.0.0.1:3054/api/v1/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming support (chunked transfer / range requests)
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        proxy_buffering off;

        # Timeout cho upload video lớn & streaming
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }
}

# =====================================================
# HTTP -> HTTPS redirect
# =====================================================
server {
    listen 80;
    server_name api5.vanquyenhair.name.vn;

    if ($host = api5.vanquyenhair.name.vn) {
        return 301 https://$host$request_uri;
    }

    return 301 https://$host$request_uri;
}
